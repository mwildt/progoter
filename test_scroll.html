<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automatisches Scrollen Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        #messages {
            height: 300px;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 20px;
        }
        .message {
            padding: 8px;
            margin: 5px 0;
            background-color: #f0f0f0;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Test: Automatisches Scrollen nach unten</h1>
    <p>Scrolle nach unten und klicke auf "Neue Nachricht hinzufügen", um die Funktion zu testen.</p>
    
    <div id="messages">
        <!-- Nachrichten werden hier hinzugefügt -->
    </div>
    
    <button onclick="addMessage()">Neue Nachricht hinzufügen</button>
    
    <script src="scrollToBottom.js"></script>
    <script>
        // Funktion zum Hinzufügen einer neuen Nachricht
        function addMessage() {
            const messagesDiv = document.getElementById('messages');
            const newMessage = document.createElement('div');
            newMessage.className = 'message';
            newMessage.textContent = 'Neue Nachricht: ' + new Date().toLocaleTimeString();
            messagesDiv.appendChild(newMessage);
            
            // Automatisches Scrollen nach unten, falls der Benutzer unten ist
            scrollToBottomIfAtBottom();
        }
        
        // Initial einige Nachrichten hinzufügen
        for (let i = 0; i < 5; i++) {
            addMessage();
        }
    </script>
</body>
</html>
